<header class="site-header">
  <div class="wrap">
    <a href="{{ '/' | relative_url }}" class="site-brand" aria-label="{{ site.title }} — home">
      <img class="site-avatar" src="{{ '/assets/avatar.png' | relative_url }}" alt="{{ site.author }}" width="44" height="44" loading="eager" decoding="async">
      <span class="site-identity">
        <span class="site-title">{{ site.title }}</span>
        {% if site.role %}<span class="site-title-role">{{ site.role }}{% if site.location %} · {{ site.location }}{% endif %}</span>{% endif %}
      </span>
    </a>
    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/blog/' | relative_url }}">Blog</a>
      <a href="{{ '/resume/' | relative_url }}">Resume</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="https://github.com/{{ site.github_username }}">GitHub</a>
      <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}/" class="icon-link" aria-label="LinkedIn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.86-3.04-1.86 0-2.14 1.45-2.14 2.95v5.66H9.33V9h3.42v1.56h.05c.48-.9 1.64-1.86 3.38-1.86 3.61 0 4.28 2.38 4.28 5.47v6.28zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zM7.12 20.45H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.45c.99 0 1.78-.77 1.78-1.72V1.72C24 .77 23.21 0 22.22 0z"/>
        </svg>
      </a>
      <button type="button" class="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>
        </svg>
      </button>
    </nav>
  </div>
</header>
